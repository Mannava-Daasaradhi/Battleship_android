# ── Google Play ───────────────────────────────────────────────────────────
play-services-games-v2      = { group = "com.google.android.gms", name = "play-services-games-v2", version.ref = "play-services-games-v2" }


# ── Image / Animation ─────────────────────────────────────────────────────
coil-compose                = { group = "io.coil-kt", name = "coil-compose", version.ref = "coil" }
lottie-compose              = { group = "com.airbnb.android", name = "lottie-compose", version.ref = "lottie-compose" }

# ── Serialization ─────────────────────────────────────────────────────────
kotlinx-serialization-json  = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinx-serialization-json" }

# ── Collections ───────────────────────────────────────────────────────────
kotlinx-collections-immutable = { group = "org.jetbrains.kotlinx", name = "kotlinx-collections-immutable", version.ref = "kotlinx-collections-immutable" }

# ── Debug ─────────────────────────────────────────────────────────────────
timber                      = { group = "com.jakewharton.timber", name = "timber", version.ref = "timber" }
leakcanary                  = { group = "com.squareup.leakcanary", name = "leakcanary-android", version.ref = "leakcanary" }

# ── Testing ───────────────────────────────────────────────────────────────
junit5-api                  = { group = "org.junit.jupiter", name = "junit-jupiter-api", version.ref = "junit5" }
junit5-engine               = { group = "org.junit.jupiter", name = "junit-jupiter-engine", version.ref = "junit5" }
junit5-params               = { group = "org.junit.jupiter", name = "junit-jupiter-params", version.ref = "junit5" }
turbine                     = { group = "app.cash.turbine", name = "turbine", version.ref = "turbine" }
robolectric                 = { group = "org.robolectric", name = "robolectric", version.ref = "robolectric" }
mockk                       = { group = "io.mockk", name = "mockk", version.ref = "mockk" }
mockk-android               = { group = "io.mockk", name = "mockk-android", version.ref = "mockk" }

# ── Benchmark ─────────────────────────────────────────────────────────────
benchmark-macro             = { group = "androidx.benchmark", name = "benchmark-macro-junit4", version.ref = "benchmark-macro" }

[plugins]
android-application         = { id = "com.android.application", version.ref = "android-gradle-plugin" }
android-library             = { id = "com.android.library", version.ref = "android-gradle-plugin" }
kotlin-android              = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-jvm                  = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
