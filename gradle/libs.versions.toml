# Compose
compose-bom                   = "2024.12.01"
activity-compose              = "1.9.3"
navigation-compose            = "2.8.5"
material3-adaptive            = "1.0.0"

# Architecture
hilt                          = "2.53"
hilt-navigation-compose       = "1.2.0"
lifecycle                     = "2.8.7"

# Data
room                          = "2.6.1"
datastore                     = "1.1.1"

# Coroutines
coroutines                    = "1.9.0"

# Firebase
firebase-bom                  = "34.0.0"

# Google Play
play-services-games-v2        = "20.1.2"


# Image loading
coil                          = "2.7.0"
