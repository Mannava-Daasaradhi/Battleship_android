robolectric                   = "4.14.1"
mockk                         = "1.13.13"
compose-ui-test               = "1.7.6"

# Build Tools
baseline-profile-gradle       = "1.3.4"
benchmark-macro               = "1.3.3"

[libraries]
# ── Compose BOM ──────────────────────────────────────────────────────────
compose-bom                 = { group = "androidx.compose", name = "compose-bom", version.ref = "compose-bom" }
compose-ui                  = { group = "androidx.compose.ui", name = "ui" }
